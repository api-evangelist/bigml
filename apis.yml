apis:

  - aid: bigml:bigml-api
    name: BigML REST API
    description: >
      The BigML REST API provides programmatic access to the full BigML machine
      learning platform. Create and manage sources, datasets, models, ensembles,
      clusters, anomaly detectors, topic models, time series forecasters, and
      generate predictions — both individual and batch — over HTTPS using
      username and API key authentication.
    image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg

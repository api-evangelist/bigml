aid: bigml
name: BigML
description: >
  BigML is a machine learning platform with a comprehensive REST API for creating
  datasets, training models, making predictions, running batch predictions, and
  managing ML workflows. The platform supports supervised and unsupervised learning
  including decision trees, ensembles, deepnets, linear and logistic regression,
  clustering, anomaly detection, topic models, and time series forecasting.
